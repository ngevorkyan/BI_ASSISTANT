services:
  bi-assistant:
    build: .
    container_name: bi-assistant
    ports:
      - "8000:8000"
      - "8501:8501"
    environment:
      - OLLAMA_MODEL=llama3.2
    depends_on:
      - ollama
    volumes:
      - ./chroma_db:/app/chroma_db

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data: